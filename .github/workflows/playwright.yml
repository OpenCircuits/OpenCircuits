name: Playwright Tests
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Enable Corepack
        run: corepack enable
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: "package.json"
          cache: "yarn"
      - run: yarn --immutable
      - name: Build NGSpice [WASM]
        uses: ./.github/actions/build-ngspice

  playwright-test:
    needs: prepare
    timeout-minutes: 60
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v7
      - name: Enable Corepack
        run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version-file: "package.json"
          cache: "yarn"
      - name: Install dependencies
        run: yarn --immutable
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Build NGSpice [WASM]
        uses: ./.github/actions/build-ngspice
      - name: Run Playwright tests
        run: yarn test-e2e:ci
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ matrix.os }}
          path: playwright-report/
          retention-days: 30
