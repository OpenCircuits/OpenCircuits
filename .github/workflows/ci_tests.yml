# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Build, Test, Lint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Enable Corepack
        run: corepack enable
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: "package.json"
          cache: "yarn"
      - run: yarn --immutable
      - name: Build NGSpice [WASM]
        uses: ./.github/actions/build-ngspice

  build:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: src/server/go.mod
          cache: true
          cache-dependency-path: src/server/go.sum

      - name: Enable Corepack
        run: corepack enable

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: "package.json"
          cache: "yarn"

      - run: yarn --immutable

      - name: Build NGSpice [WASM]
        uses: ./.github/actions/build-ngspice

      - name: Build backend [Golang]
        run: yarn build --ci src/server

      - name: Build frontend [TypeScript]
        run: yarn build --ci --prod src/projects/digital/site

      - name: Build docs [Docusaurus]
        run: yarn build --ci src/other/pages/docs

  tests:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Enable Corepack
        run: corepack enable

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: "package.json"
          cache: "yarn"

      - run: yarn --immutable

      - name: Build NGSpice [WASM]
        uses: ./.github/actions/build-ngspice

      - name: Run tests [TypeScript]
        run: yarn test --ci
